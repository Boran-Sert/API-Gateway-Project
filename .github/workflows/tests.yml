name: Python CI (Microservices Tests)

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  # ─── Shared Library Testleri ───
  shared-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Shared Library Tests
      run: python -m pytest shared/tests/ -v --tb=short

  # ─── Servis Testleri (Matrix) ───
  service-tests:
    runs-on: ubuntu-latest
    needs: shared-tests
    env:
      PYTHONPATH: ${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: product-service
            test_dir: product_tests
          - service: user-service
            test_dir: user_tests
          - service: auth-service
            test_dir: auth_tests
          - service: dispatcher
            test_dir: dispatcher_tests

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r ${{ matrix.service }}/requirements.txt
    - name: Run ${{ matrix.service }} Tests
      working-directory: ${{ matrix.service }}
      run: python -m pytest ${{ matrix.test_dir }}/ -v --tb=short