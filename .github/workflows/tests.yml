name: Python CI (Microservices Tests)

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  # ─── Shared Library Testleri ───
  shared-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Shared Library Tests
      run: python -m pytest shared/tests/ -v --tb=short

  # ─── Servis Testleri (Matrix) ───
  service-tests:
    runs-on: ubuntu-latest
    needs: shared-tests
    env:
      PYTHONPATH: ${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix:
        service: [product-service, user-service, auth-service, dispatcher]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r ${{ matrix.service }}/requirements.txt
    - name: Run ${{ matrix.service }} Tests
      working-directory: ${{ matrix.service }}
      run: python -m pytest tests/ -v --tb=short